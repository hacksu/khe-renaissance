<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Kent Hack Enough heraldic shield">
  <defs>
    <clipPath id="shield-clip">
      <path d="M100,228 C100,228 12,180 12,90 C12,50 12,18 100,18 C188,18 188,50 188,90 C188,180 100,228 100,228 Z"/>
    </clipPath>

    <clipPath id="left-half-clip">
      <rect x="0" y="0" width="100" height="240"/>
    </clipPath>

    <clipPath id="right-half-clip">
      <rect x="100" y="0" width="100" height="240"/>
    </clipPath>

    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8c96a"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7a30"/>
    </linearGradient>

    <filter id="shield-shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="emblem-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#c9a84c" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g id="shield-body" filter="url(#shield-shadow)">

    <path
      d="M100,228 C100,228 12,180 12,90 C12,50 12,18 100,18 L100,228 Z"
      fill="#2e2e3a"
    />

    <path
      d="M100,18 C188,18 188,50 188,90 C188,180 100,228 100,228 L100,18 Z"
      fill="#1a2e4a"
    />

    <line x1="100" y1="18" x2="100" y2="228" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>

    <g clip-path="url(#shield-clip)">
      <polygon points="44,42  50,36  56,42  50,48" fill="#c9a84c" opacity="0.85"/>
      <polygon points="44,148 50,142 56,148 50,154" fill="#c9a84c" opacity="0.85"/>
      <polygon points="144,42  150,36  156,42  150,48" fill="#c9a84c" opacity="0.85"/>
      <polygon points="144,148 150,142 156,148 150,154" fill="#c9a84c" opacity="0.85"/>
    </g>

    <g clip-path="url(#shield-clip)" opacity="0.75">
      <g transform="translate(50,95)">
        <rect x="-2" y="0" width="4" height="14" rx="1" fill="#c9a84c"/>
        <ellipse cx="0" cy="-8" rx="4" ry="9" fill="#c9a84c"/>
        <ellipse cx="-7" cy="-2" rx="4" ry="7" fill="#c9a84c" transform="rotate(-30,-7,-2)"/>
        <ellipse cx="7" cy="-2" rx="4" ry="7" fill="#c9a84c" transform="rotate(30,7,-2)"/>
        <ellipse cx="-5" cy="14" rx="3" ry="2" fill="#c9a84c"/>
        <ellipse cx="5"  cy="14" rx="3" ry="2" fill="#c9a84c"/>
      </g>

      <g transform="translate(150,95)">
        <rect x="-2" y="0" width="4" height="14" rx="1" fill="#c9a84c"/>
        <ellipse cx="0" cy="-8" rx="4" ry="9" fill="#c9a84c"/>
        <ellipse cx="-7" cy="-2" rx="4" ry="7" fill="#c9a84c" transform="rotate(-30,-7,-2)"/>
        <ellipse cx="7"  cy="-2" rx="4" ry="7" fill="#c9a84c" transform="rotate(30,7,-2)"/>
        <ellipse cx="-5" cy="14" rx="3" ry="2" fill="#c9a84c"/>
        <ellipse cx="5"  cy="14" rx="3" ry="2" fill="#c9a84c"/>
      </g>
    </g>

    <path
      d="M100,228 C100,228 12,180 12,90 C12,50 12,18 100,18 C188,18 188,50 188,90 C188,180 100,228 100,228 Z"
      fill="none"
      stroke="url(#gold-gradient)"
      stroke-width="7"
      stroke-linejoin="round"
      stroke-linecap="round"
    />

    <path
      d="M100,218 C100,218 22,173 22,90 C22,54 22,28 100,28 C178,28 178,54 178,90 C178,173 100,218 100,218 Z"
      fill="none"
      stroke="#c9a84c"
      stroke-width="1.5"
      stroke-linejoin="round"
      stroke-linecap="round"
      opacity="0.55"
    />

  </g>


  <g id="shield-emblem" transform="translate(100,105)" filter="url(#emblem-glow)">

    <rect x="-18" y="-18" width="36" height="30" rx="2" fill="#c9a84c"/>

    <rect x="-18" y="-30" width="9"  height="13" rx="1.5" fill="#c9a84c"/>
    <rect x="-5"  y="-30" width="10" height="13" rx="1.5" fill="#c9a84c"/>
    <rect x="9"   y="-30" width="9"  height="13" rx="1.5" fill="#c9a84c"/>

    <rect x="-7" y="-4" width="14" height="16" rx="1" fill="#1a2e4a"/>
    <path d="M -7,-4 A 7,7 0 0,1 7,-4" fill="#1a2e4a"/>

    <rect x="-14" y="-12" width="3" height="9" rx="1" fill="#1a2e4a" opacity="0.9"/>
    <rect x="11"  y="-12" width="3" height="9" rx="1" fill="#1a2e4a" opacity="0.9"/>

    <rect x="-21" y="12" width="42" height="4" rx="1.5" fill="#c9a84c"/>

  </g>


  <g id="shield-banner" transform="translate(100,232)">

    <path
      d="M -58,0 L -64,10 L -58,20 L 58,20 L 64,10 L 58,0 Z"
      fill="#4a3520"
    />

    <path
      d="M -58,0 L 58,0 L 58,4 L -58,4 Z"
      fill="#6b4e2e"
      opacity="0.5"
    />

    <path
      d="M -58,0 L -64,10 L -58,20 L 58,20 L 64,10 L 58,0 Z"
      fill="none"
      stroke="#c9a84c"
      stroke-width="1.5"
      stroke-linejoin="round"
    />

    <text
      x="0" y="14"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="7.5"
      font-weight="bold"
      letter-spacing="1.5"
      fill="#c9a84c"
    >KHE 2027</text>

  </g>

</svg>
