<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <filter id="aurora-blur-soft" x="-40%" y="-10%" width="180%" height="120%">
      <feGaussianBlur stdDeviation="18 8" result="blur"/>
    </filter>
    <filter id="aurora-blur-wide" x="-60%" y="-10%" width="220%" height="120%">
      <feGaussianBlur stdDeviation="30 12" result="blur"/>
    </filter>
    <filter id="aurora-blur-narrow" x="-30%" y="-5%" width="160%" height="110%">
      <feGaussianBlur stdDeviation="12 5" result="blur"/>
    </filter>
    <filter id="horizon-blur" x="-50%" y="-100%" width="200%" height="300%">
      <feGaussianBlur stdDeviation="60 40" result="blur"/>
    </filter>
    <filter id="star-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="horizonGradient" cx="50%" cy="100%" r="55%" fx="50%" fy="100%">
