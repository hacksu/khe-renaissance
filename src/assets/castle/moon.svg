<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!--
    KHE 2027 — Hack the Kingdom
    Nighttime sky element: crescent moon with stars and cloud wisps.
    Groups are animation-ready:
      #moon       — pulse or drift
      #stars-large — twinkle / scale
      #stars-small — twinkle / fade
      #clouds      — drift clouds group X for moving cloud animation
  -->

  
  <g id="moon">
    <!--
      True crescent path constructed from two circular arcs.
      Outer arc: radius ~90, center (165, 148).
      Inner arc: radius ~72, center shifted (195, 132) to create the inner curve.
      The result is an organic, tapered crescent pointing upper-left.
    -->

    
    <ellipse cx="168" cy="148" rx="96" ry="94" fill="#e8d5a3" opacity="0.07"/>
    <ellipse cx="168" cy="148" rx="84" ry="82" fill="#e8d5a3" opacity="0.07"/>

    
    <path
      d="
        M 168,62
        A 88,88 0 1 1 97,218
        A 66,66 0 1 0 168,62
        Z
      "
      fill="#e8d5a3"
    />

    
    <path
      d="
        M 168,62
        A 88,88 0 0 1 253,148
        A 88,88 0 0 1 190,224
        A 80,80 0 0 0 238,148
        A 80,80 0 0 0 162,70
        Z
      "
      fill="#f5e8c0"
      opacity="0.55"
    />

    
    <path
      d="
        M 168,62
        A 66,66 0 1 1 97,218
        A 70,70 0 0 0 150,90
        A 70,70 0 0 0 168,62
        Z
      "
      fill="#c9a84c"
      opacity="0.30"
    />
  </g>

  
  <g id="stars-large" fill="#f5e8c0">

    
    
    <polygon
      points="
        52,59
        55.6,66.5
        63.8,67.5
        58.4,73.4
        60,81.5
        52,77.5
        44,81.5
        45.6,73.4
        40.2,67.5
        48.4,66.5
      "
      fill="#f5e8c0"
    />

    
    
    <path
      d="M38,180 L40.5,192.5 L53,195 L40.5,197.5 L38,210 L35.5,197.5 L23,195 L35.5,192.5 Z"
      fill="#f5e8c0"
    />

    
    
    <polygon
      points="
        255,77
        258.3,83.5
        265.5,84.5
        260.5,90
        261.9,97.5
        255,94
        248.1,97.5
        249.5,90
        244.5,84.5
        251.7,83.5
      "
      fill="#f5e8c0"
    />

    
    
    <path
      d="M240,218 L242,227.5 L251.5,230 L242,232.5 L240,242 L238,232.5 L228.5,230 L238,227.5 Z"
      fill="#f5e8c0"
    />

  </g>

  
  <g id="stars-medium" fill="#f5e8c0">

    
    
    <path
      d="M140,40 L141.4,46.6 L148,48 L141.4,49.4 L140,56 L138.6,49.4 L132,48 L138.6,46.6 Z"
      fill="#f5e8c0"
    />

    
    
    <path
      d="M28,123 L29.2,128.8 L35,130 L29.2,131.2 L28,137 L26.8,131.2 L21,130 L26.8,128.8 Z"
      fill="#f5e8c0"
      opacity="0.85"
    />

    
    
    <path
      d="M88,248 L89.3,254.7 L96,256 L89.3,257.3 L88,264 L86.7,257.3 L80,256 L86.7,254.7 Z"
      fill="#f5e8c0"
      opacity="0.80"
    />

  </g>

  
  <g id="stars-small">

    
    <circle cx="82"  cy="44"  r="1.8" fill="#f5e8c0"/>
    <circle cx="112" cy="30"  r="1.4" fill="#f5e8c0"/>
    <circle cx="200" cy="42"  r="2.0" fill="#f5e8c0"/>
    <circle cx="278" cy="130" r="1.5" fill="#f5e8c0"/>
    <circle cx="268" cy="195" r="1.3" fill="#f5e8c0"/>
    <circle cx="185" cy="268" r="1.7" fill="#f5e8c0"/>
    <circle cx="130" cy="282" r="1.2" fill="#f5e8c0"/>

    
    <circle cx="22"  cy="68"  r="1.6" fill="#8e8ea8"/>
    <circle cx="65"  cy="158" r="1.3" fill="#8e8ea8"/>
    <circle cx="18"  cy="248" r="1.5" fill="#8e8ea8"/>
    <circle cx="155" cy="262" r="1.1" fill="#8e8ea8"/>
    <circle cx="290" cy="60"  r="1.4" fill="#8e8ea8"/>
    <circle cx="292" cy="225" r="1.6" fill="#8e8ea8"/>
    <circle cx="60"  cy="250" r="1.0" fill="#8e8ea8"/>

  </g>

  
  
  <g id="clouds" fill="#1a2e4a" opacity="0.60">

    <!--
      Cloud wisp 1 — sweeps across the lower-left,
      partly overlapping the 4-pointed star at (38,195).
      Thin elongated ellipse cluster.
    -->
    <ellipse cx="62"  cy="200" rx="42" ry="7"  transform="rotate(-8, 62, 200)"/>
    <ellipse cx="48"  cy="196" rx="24" ry="5"  transform="rotate(-8, 48, 196)"/>
    <ellipse cx="80"  cy="204" rx="20" ry="4"  transform="rotate(-8, 80, 204)"/>

    <!--
      Cloud wisp 2 — drifts across the upper area,
      partly obscuring the small dot star at (112, 30) and (82, 44).
      Very thin and translucent.
    -->
    <ellipse cx="108" cy="55"  rx="52" ry="6"  transform="rotate(-5, 108, 55)" opacity="0.50"/>
    <ellipse cx="90"  cy="51"  rx="28" ry="4"  transform="rotate(-5, 90, 51)"  opacity="0.50"/>
    <ellipse cx="130" cy="58"  rx="22" ry="3.5" transform="rotate(-5, 130, 58)" opacity="0.45"/>

  </g>

</svg>
