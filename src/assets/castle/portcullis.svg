<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    
    <linearGradient id="barGradV" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="30%" stop-color="#2e2e3c"/>
      <stop offset="55%" stop-color="#4a4a5c"/>
      <stop offset="75%" stop-color="#2e2e3c"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </linearGradient>

    
    <linearGradient id="barGradH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="30%" stop-color="#2e2e3c"/>
      <stop offset="55%" stop-color="#4a4a5c"/>
      <stop offset="75%" stop-color="#2e2e3c"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </linearGradient>

    
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="20%" stop-color="#2e2e3c"/>
      <stop offset="50%" stop-color="#3a3a4c"/>
      <stop offset="80%" stop-color="#2e2e3c"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </linearGradient>

    
    <radialGradient id="rivetGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6b6b80"/>
      <stop offset="50%" stop-color="#4a4a5c"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </radialGradient>

    
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="40%" stop-color="#3a3a4c"/>
      <stop offset="60%" stop-color="#4a4a5c"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </linearGradient>

    
    
    <linearGradient id="tipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="50%" stop-color="#3a3a4c"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </linearGradient>
  </defs>

  

  <!-- ═══════════════════════════════════════════════════════════
       CHAINS — rendered behind portcullis so they appear to
       emerge from the top of the frame
       ═══════════════════════════════════════════════════════════ -->
  <g id="chains">

    
    <g id="chain-left" transform="translate(100, 0)">
      
      

      
      <ellipse cx="0" cy="72" rx="6" ry="10" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="72" rx="2.5" ry="6" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="56" rx="10" ry="6" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="56" rx="6" ry="2.5" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="40" rx="6" ry="10" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="40" rx="2.5" ry="6" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="24" rx="10" ry="6" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="24" rx="6" ry="2.5" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="8" rx="6" ry="10" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="8" rx="2.5" ry="6" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="3" cy="40" rx="2" ry="4" fill="#5a3520" opacity="0.35"/>
    </g>

    
    <g id="chain-right" transform="translate(300, 0)">
      
      <ellipse cx="0" cy="72" rx="6" ry="10" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="72" rx="2.5" ry="6" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="56" rx="10" ry="6" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="56" rx="6" ry="2.5" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="40" rx="6" ry="10" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="40" rx="2.5" ry="6" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="24" rx="10" ry="6" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="24" rx="6" ry="2.5" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="0" cy="8" rx="6" ry="10" fill="url(#chainGrad)" stroke="#1e1e28" stroke-width="1.5"/>
      <ellipse cx="0" cy="8" rx="2.5" ry="6" fill="none" stroke="#4a4a5c" stroke-width="0.8" opacity="0.6"/>

      
      <ellipse cx="-3" cy="56" rx="2" ry="4" fill="#5a3520" opacity="0.35"/>
    </g>

  </g>


  <!-- ═══════════════════════════════════════════════════════════
       PORTCULLIS — main gate group
       translate this group Y to animate raising/lowering
       ═══════════════════════════════════════════════════════════ -->
  <g id="portcullis">

    <!-- ─────────────────────────────────────────────────────────
         OUTER IRON FRAME
         Occupies x:60–340, y:80–500 (bars extend below to ~540)
         Frame is rendered as four thick rects; interior is open
         ───────────────────────────────────────────────────────── -->

    
    <rect x="60" y="80" width="280" height="24" fill="url(#frameGrad)" stroke="#1e1e28" stroke-width="2"/>
    
    <rect x="64" y="83" width="272" height="8" fill="none" stroke="#4a4a5c" stroke-width="1" opacity="0.5"/>
    
    <rect x="80" y="92" width="40" height="3" fill="#5a3520" opacity="0.3" rx="1"/>
    <rect x="260" y="92" width="40" height="3" fill="#5a3520" opacity="0.3" rx="1"/>

    
    <rect x="60" y="80" width="24" height="420" fill="url(#frameGrad)" stroke="#1e1e28" stroke-width="2"/>
    
    <rect x="63" y="84" width="8" height="412" fill="none" stroke="#4a4a5c" stroke-width="1" opacity="0.5"/>

    
    <rect x="316" y="80" width="24" height="420" fill="url(#frameGrad)" stroke="#1e1e28" stroke-width="2"/>
    
    <rect x="329" y="84" width="8" height="412" fill="none" stroke="#4a4a5c" stroke-width="1" opacity="0.5"/>

    
    <rect x="60" y="488" width="280" height="16" fill="url(#frameGrad)" stroke="#1e1e28" stroke-width="2"/>
    
    <rect x="64" y="491" width="272" height="5" fill="none" stroke="#4a4a5c" stroke-width="1" opacity="0.5"/>

    
    <circle cx="72" cy="92" r="7" fill="url(#rivetGrad)" stroke="#1e1e28" stroke-width="1.5"/>
    <circle cx="328" cy="92" r="7" fill="url(#rivetGrad)" stroke="#1e1e28" stroke-width="1.5"/>
    <circle cx="72" cy="496" r="7" fill="url(#rivetGrad)" stroke="#1e1e28" stroke-width="1.5"/>
    <circle cx="328" cy="496" r="7" fill="url(#rivetGrad)" stroke="#1e1e28" stroke-width="1.5"/>


